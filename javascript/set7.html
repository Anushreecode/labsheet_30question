<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>simple intrest</title>
</head>

<body>
    <script>
        function simpleinterest(p, t, r) {
            return (p * t * r) / 100
        }
        document.write("Simple intrest is: " + simpleinterest(1050, 2, 5));
    </script>
</body>
