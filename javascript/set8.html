<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>factorial</title>
</head>

<body>
    <script>
        function factorial(number) {
            let result = 1
            for (let index = 1; index <= number; index++) {
                result = result * index
            }
            return result
        }

        document.write("Factorial of 5 is: " + factorial(5));
    </script>
</body>

</html>
