<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>odd even</title>
</head>

<body>
    <script>
        function oddevenchecker(n) {
            if (n % 2 === 0) {
                return 'even';
            } else {
                return 'odd';
            }
        }

        let number = 5;
        document.write(number + " is an " + oddevenchecker(number) + " number.");
    </script>
</body>

</html>
